<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CORPOTRADING | Portal del Asesor</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00e5ff">
    <link rel="apple-touch-icon" href="pwa-icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00e5ff;
            --bg-dark: #0a192f;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: #e6f1ff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        header {
            padding: 1.5rem;
            background: rgba(10, 25, 47, 0.9);
            border-bottom: 2px solid var(--primary);
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        header h1 { font-size: 1.2rem; font-weight: 800; letter-spacing: 1px; }
        header span { color: var(--primary); }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .msg {
            max-width: 85%;
            padding: 1rem;
            border-radius: 16px;
            font-size: 0.95rem;
            line-height: 1.4;
            position: relative;
        }
        .msg-user {
            align-self: flex-start;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 4px;
        }
        .msg-advisor {
            align-self: flex-end;
            background: var(--primary);
            color: #0a192f;
            font-weight: 600;
            border-bottom-right-radius: 4px;
        }
        .msg-lang {
            font-size: 0.7rem;
            opacity: 0.6;
            margin-bottom: 0.3rem;
            display: block;
        }

        .input-area {
            padding: 1.2rem;
            background: #112240;
            display: flex;
            gap: 0.8rem;
            align-items: center;
            border-top: 1px solid var(--glass-border);
        }
        input {
            flex: 1;
            padding: 0.8rem 1.2rem;
            border-radius: 100px;
            border: 1px solid var(--glass-border);
            background: rgba(10, 25, 47, 0.5);
            color: white;
            font-family: inherit;
            outline: none;
        }
        input:focus { border-color: var(--primary); }
        
        button {
            background: var(--primary);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
        }

        .empty {
            text-align: center;
            margin-top: 100px;
            opacity: 0.4;
        }
    </style>
</head>
<body>
    <header>
        <h1>CORPO<span>TRADING</span> | ASESOR</h1>
    </header>

    <div id="chat-container">
        <div class="empty">Esperando mensajes de clientes...</div>
    </div>

    <div class="input-area">
        <input type="text" id="reply-input" placeholder="Escribe tu respuesta en español...">
        <button id="send-btn">➤</button>
    </div>

    <script src="advisor.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('Service Worker Registered'))
                .catch(err => console.log('Service Worker Error', err));
        }
    </script>
</body>
</html>
