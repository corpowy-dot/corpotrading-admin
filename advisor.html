<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CORPOTRADING | Portal del Asesor</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00e5ff">
    <link rel="apple-touch-icon" href="pwa-icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Firebase SDKs (PRO) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root {
            --primary: #00e5ff;
            --bg-dark: #0a192f;
            --glass: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.15);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: #e6f1ff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-size: 16px; /* Base for mobile */
        }
        header {
            padding: 1.2rem;
            background: rgba(10, 25, 47, 0.95);
            border-bottom: 3px solid var(--primary);
            text-align: center;
            box-shadow: 0 4px 30px rgba(0,0,0,0.6);
            z-index: 100;
        }
        header h1 { font-size: 1.4rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }
        header span { color: var(--primary); text-shadow: 0 0 10px var(--primary); }

        #session-selector {
            background: #112240;
            padding: 0.8rem;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            gap: 12px;
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
        }
        .session-tab {
            padding: 8px 18px;
            background: var(--glass);
            border: 2px solid var(--glass-border);
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .session-tab.active {
            background: var(--primary);
            color: #0a192f;
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary);
        }

        /* Flash Animation for background messages */
        @keyframes flash-red {
            0% { border-color: var(--glass-border); background: var(--glass); }
            50% { border-color: #ff3e3e; background: rgba(255, 62, 62, 0.3); box-shadow: 0 0 15px #ff3e3e; }
            100% { border-color: var(--glass-border); background: var(--glass); }
        }
        .session-tab.notified {
            animation: flash-red 1s infinite;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            background: radial-gradient(circle at center, #112240 0%, #0a192f 100%);
        }

        .msg {
            max-width: 90%;
            padding: 1.1rem;
            border-radius: 20px;
            font-size: 1.05rem;
            line-height: 1.5;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .msg-user {
            align-self: flex-start;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 4px;
        }
        .msg-advisor {
            align-self: flex-end;
            background: var(--primary);
            color: #0a192f;
            font-weight: 700;
            border-bottom-right-radius: 4px;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
        }
        .msg-lang {
            font-size: 0.75rem;
            opacity: 0.5;
            margin-bottom: 0.4rem;
            display: block;
            text-transform: uppercase;
        }
        .msg-trans {
            font-weight: 800;
            color: #fff;
            display: block;
            margin-top: 5px;
            font-size: 1.15rem;
        }

        .input-area {
            padding: 1.2rem;
            background: rgba(17, 34, 64, 0.98);
            display: flex;
            gap: 1rem;
            align-items: center;
            border-top: 2px solid var(--glass-border);
            padding-bottom: env(safe-area-inset-bottom);
        }
        input {
            flex: 1;
            padding: 1rem 1.5rem;
            border-radius: 100px;
            border: 2px solid var(--glass-border);
            background: rgba(10, 25, 47, 0.8);
            color: white;
            font-size: 1.1rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus { border-color: var(--primary); }
        
        #send-btn {
            background: var(--primary);
            border: none;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            box-shadow: 0 0 15px var(--primary);
            flex-shrink: 0;
        }

        .empty {
            text-align: center;
            margin-top: 80px;
            opacity: 0.5;
            font-size: 1rem;
            font-style: italic;
        }

        /* Volume Control Overlay */
        #audio-init {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 25, 47, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            text-align: center;
            padding: 2rem;
        }
        #audio-init button {
            width: auto;
            height: auto;
            border-radius: 8px;
            padding: 1rem 2rem;
            margin-top: 1rem;
            font-weight: 800;
        }
    </style>
</head>
<body>
    <div id="audio-init">
        <h2>CENTRO DE COMANDO</h2>
        <p>Activa el sonido para recibir alertas de clientes</p>
        <button onclick="initAudio()">ACTIVAR ALERTAS</button>
    </div>

    <header>
        <h1>CORPO<span>TRADING</span> | ADVISOR</h1>
    </header>

    <div id="session-selector">
        <div class="empty">Esperando nuevos clientes...</div>
    </div>

    <div id="chat-container">
        <div class="empty">Selecciona un chat activo</div>
    </div>

    <div class="input-area">
        <input type="text" id="reply-input" placeholder="Responder en español..." autocomplete="off">
        <button id="send-btn">➤</button>
    </div>

    <script src="advisor.js"></script>
    <script>
        let audioCtx;
        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('audio-init').style.display = 'none';
            playNotification(); // Test sound
        }

        function playNotification() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime); // A5
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(e => {});
        }
    </script>
</body>
</html>
