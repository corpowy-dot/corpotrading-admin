<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CORPOTRADING | Portal del Asesor</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00e5ff">
    <link rel="apple-touch-icon" href="pwa-icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Firebase SDKs (PRO) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root {
            --primary: #00e5ff;
            --bg-dark: #0a192f;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: #e6f1ff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        header {
            padding: 1rem;
            background: rgba(10, 25, 47, 0.9);
            border-bottom: 2px solid var(--primary);
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        header h1 { font-size: 1.1rem; font-weight: 800; letter-spacing: 1px; }
        header span { color: var(--primary); }

        #session-selector {
            background: #112240;
            padding: 0.5rem;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            gap: 10px;
            overflow-x: auto;
            white-space: nowrap;
        }
        .session-tab {
            padding: 5px 12px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            font-size: 0.75rem;
            cursor: pointer;
        }
        .session-tab.active {
            background: var(--primary);
            color: #0a192f;
            font-weight: 800;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .msg {
            max-width: 85%;
            padding: 0.8rem;
            border-radius: 12px;
            font-size: 0.9rem;
            line-height: 1.4;
            position: relative;
        }
        .msg-user {
            align-self: flex-start;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 4px;
        }
        .msg-advisor {
            align-self: flex-end;
            background: var(--primary);
            color: #0a192f;
            font-weight: 600;
            border-bottom-right-radius: 4px;
        }
        .msg-lang {
            font-size: 0.65rem;
            opacity: 0.5;
            margin-bottom: 0.2rem;
            display: block;
        }
        .msg-trans {
            font-weight: 700;
            color: #fff;
        }

        .input-area {
            padding: 1rem;
            background: #112240;
            display: flex;
            gap: 0.8rem;
            align-items: center;
            border-top: 1px solid var(--glass-border);
        }
        input {
            flex: 1;
            padding: 0.7rem 1rem;
            border-radius: 100px;
            border: 1px solid var(--glass-border);
            background: rgba(10, 25, 47, 0.5);
            color: white;
            font-family: inherit;
            outline: none;
        }
        input:focus { border-color: var(--primary); }
        
        button {
            background: var(--primary);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.1rem;
        }

        .empty {
            text-align: center;
            margin-top: 50px;
            opacity: 0.4;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>CORPO<span>TRADING</span> | ASESOR</h1>
    </header>

    <div id="session-selector">
        <div class="empty">Cargando sesiones...</div>
    </div>

    <div id="chat-container">
        <div class="empty">Selecciona un cliente para chatear</div>
    </div>

    <div class="input-area">
        <input type="text" id="reply-input" placeholder="Escribe al cliente en español...">
        <button id="send-btn">➤</button>
    </div>

    <script src="advisor.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(e => {});
        }
    </script>
</body>
</html>
